name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  montar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar as versões e gerar o index.json
        run: python3 ferramentas/validar.py --index

      - name: Montar o site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets versoes _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  publicar:
    needs: montar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
